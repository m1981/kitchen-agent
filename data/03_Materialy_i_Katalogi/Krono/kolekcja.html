            defer

        <style>
            /* ── Zmienne kolorystyczne ── */
            :root {
                --clr-bg: #f5f4f1;
                --clr-card: #ffffff;
                --clr-border: #e2e0da;
                --clr-accent: #2c5f4a;
                --clr-accent-light: #e8f0ec;
                --clr-text: #1a1a18;
                --clr-muted: #6b6b60;
                --clr-new: #c8832a;
            }

            body {
                background: var(--clr-bg);
                color: var(--clr-text);
                font-family: 'Segoe UI', system-ui, sans-serif;
            }

            /* ── Swatch (kafelek próbki) ── */
            .swatch {
                width: 100%;
                max-width: 80px; /* Strict max-width for consistency */
                aspect-ratio: 1/1;
                border-radius: 6px;
                border: 1.5px solid var(--clr-border);
                background-size: cover;
                background-position: center;
                /* fallback gradient gdy brak pliku */
                background-color: #d4cfc7;
                display: flex;
                align-items: flex-end;
                overflow: hidden;
                transition: box-shadow 0.15s;
                margin: 0 auto; /* Center the swatch in its column */
            }
            .swatch:hover {
                box-shadow: 0 0 0 2px var(--clr-accent);
            }
            .swatch-label {
                width: 100%;
                font-size: 9px;
                line-height: 1.2;
                background: rgba(0, 0, 0, 0.45);
                color: #fff;
                padding: 3px 4px;
                text-align: center;
            }

            /* ── Wiersz zestawu ── */
            .row-card {
                background: var(--clr-card);
                border: 1px solid var(--clr-border);
                border-radius: 10px;
                transition: box-shadow 0.15s;
            }
            .row-card:hover {
                box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            }

            /* ── Badge NEW ── */
            .badge-new {
                background: var(--clr-new);
                color: #fff;
                font-size: 9px;
                font-weight: 700;
                letter-spacing: 0.5px;
                padding: 1px 5px;
                border-radius: 3px;
                vertical-align: middle;
                margin-left: 4px;
            }

            /* ── Sticky header ── */
            .sticky-head {
                position: sticky;
                top: 0;
                z-index: 10;
                background: var(--clr-bg);
                border-bottom: 1px solid var(--clr-border);
            }

            /* ── Filtr chips ── */
            .chip {
                padding: 4px 12px;
                border-radius: 20px;
                font-size: 12px;
                cursor: pointer;
                border: 1px solid var(--clr-border);
                background: #fff;
                transition: all 0.15s;
            }
            .chip.active {
                background: var(--clr-accent);
                color: #fff;
                border-color: var(--clr-accent);
            }

            /* ── Kolumna-sekcja ── */
            .col-head {
                font-size: 10px;
                font-weight: 700;
                letter-spacing: 0.8px;
                text-transform: uppercase;
                color: var(--clr-muted);
            }

            /* ── Placeholder (gdy brak grafiki) ── */
            .ph {
                background: repeating-linear-gradient(
                    45deg,
                    #e0ddd6,
                    #e0ddd6 4px,
                    #eceae4 4px,
                    #eceae4 8px
                );
            }

            /* ── Grid Layout ── */
            .data-grid {
                display: grid;
                grid-template-columns: minmax(200px, 2fr) repeat(4, minmax(90px, 1fr));
                gap: 12px;
                align-items: center;
            }
        </style>
    </head>

    <body x-data="app()" x-init="init()">
        <!-- ══ NAGŁÓWEK ══ -->
        <header class="sticky-head px-6 py-3 flex items-center gap-4 flex-wrap">
            <div class="flex items-center gap-2 mr-4">
                <div class="w-3 h-3 rounded-full" style="background: var(--clr-accent)"></div>
                <span class="font-bold tracking-wide text-sm">SWISS KRONO</span>
                <span class="text-xs" style="color: var(--clr-muted)"
                    >Zestawy kuchenne 02.2026</span
                >
            </div>

            <!-- Szukajka -->
            <input
                x-model="search"
                type="search"
                placeholder="Szukaj dekoru…"
                class="border rounded-lg px-3 py-1.5 text-sm flex-1 min-w-32 max-w-xs focus:outline-none focus:ring-2 focus:ring-[#2c5f4a] focus:border-transparent"
                style="border-color: var(--clr-border)"
            />

            <!-- Filtry kategorii -->
            <div class="flex gap-1 flex-wrap">
                <template x-for="cat in categories" :key="cat.id">
                    <button
                        @click="toggleCat(cat.id)"
                        :class="activeCats.includes(cat.id) ? 'chip active' : 'chip'"
                        x-text="cat.label"
                    ></button>
                </template>
            </div>

            <!-- Licznik -->
            <span class="text-xs ml-auto whitespace-nowrap" style="color: var(--clr-muted)">
                <span x-text="filtered.length"></span> / <span x-text="rows.length"></span> zestawów
            </span>
        </header>

        <!-- ══ LEGENDA KOLUMN ══ -->
        <div class="px-6 py-2 data-grid">
            <div class="col-head">Nazwa dekoru</div>

            <div class="col-head text-center">📄 HPL</div>
            <div class="col-head text-center">🟫 Podłoga</div>

        <!-- ══ SIATKA ZESTAWÓW ══ -->
        <main class="px-6 pb-10 space-y-2">

                    Brak wyników dla "<span x-text="search"></span>"

            <template x-for="row in filtered" :key="row.id">

                            <span

                        </div>
                        <div class="flex gap-1 mt-1 flex-wrap">
                            <template x-for="tag in row.tags" :key="tag">

                                    class="text-xs px-1.5 py-0.5 rounded"
                                    style="
                                        background: var(--clr-accent-light);
                                        color: var(--clr-accent);
                                    "
                                    x-text="tag"
                                ></span>
                            </template>
                        </div>
                    </div>

                    <!-- Płyta MFC -->
                    <div class="flex flex-col items-center gap-1 w-full">
                        <template x-if="row.plyta">
                            <div class="w-full">
                                <div
                                    class="swatch"
                                    :class="!row.plyta.img && 'ph'"
                                    :style="row.plyta.img ? `background-image:url('img/${row.plyta.img}')` : ''"
                                >
                                    <span class="swatch-label" x-text="row.plyta.code"></span>
                                </div>
                                <div
                                    class="text-center text-xs mt-1"
                                    style="color: var(--clr-muted)"
                                    x-text="row.plyta.struct"
                                ></div>
                            </div>
                        </template>
                        <template x-if="!row.plyta">
                            <div class="text-xs" style="color: var(--clr-border)">—</div>
                        </template>
                    </div>

                    <!-- Blat -->
                    <div class="flex flex-col items-center gap-1 w-full">
                        <template x-if="row.blat">

                                <div

                            </div>

                        <template x-if="!row.blat">

                    toggleCat(id) {
                        if (this.activeCats.includes(id)) {
                            this.activeCats = this.activeCats.filter((c) => c !== id);
                        } else {
                            this.activeCats.push(id);

                    get filtered() {
                        let r = this.rows;
                        if (this.activeCats.length) {

                        if (this.search.trim()) {
                            const q = this.search.trim().toLowerCase();
                            r = r.filter(

                                    row.name.toLowerCase().includes(q) ||
                                    row.code.toLowerCase().includes(q) ||
                                    row.tags.some((t) => t.toLowerCase().includes(q))
                            );
                        }
                        return r;
